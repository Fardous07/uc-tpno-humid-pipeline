active_learning:
  acquisition: qEHVI
  budget: 500
  enable: true
  fidelity_levels:
    gcmc_long:
      cost: 5.0
      noise: 0.02
    gcmc_short:
      cost: 1.0
      noise: 0.05
    gctmmc:
      cost: 0.1
      noise: 0.1
  fidelity_selector: cost_ratio
  multi_fidelity: true
  n_candidates: 10
  n_init: 20
  n_iterations: 50
  rho_threshold: 0.85
data:
  adsorption_dir: data/processed/adsorption
  adsorption_parquet: data/processed/adsorption/adsorption_training.parquet
  arc_mof_dir: data/raw/arc_mof_charges
  core_mof_dir: data/raw/core_mof_2019
  dataset:
    lazy_loading: true
    max_arc_mofs: 500
    max_core_mofs: 500
    shuffle_selection: true
  graph_dir: data/processed/graphs
  intermediate_dir: data/intermediate
  mofx_db_dir: data/raw/mofx_db
  processed_dir: data/processed
  raw_dir: data/raw
  registry_parquet: data/mof_registry.parquet
  sanitized_cif_dir: data/intermediate/cifs_sanitized
  seed: 42
  split_method: random
  splits_file: experiments/run_001/splits.json
  test_size: 0.1
  val_size: 0.1
experiment:
  cudnn_benchmark: false
  cudnn_deterministic: true
  description: TPNO training with conservative physics losses (0.01/0.05/0.005)
  deterministic: true
  device: cuda
  name: uc_tpno_run_001
  num_workers: 4
  pin_memory: true
  seed: 42
  tags:
  - baseline
  - physics-informed
  - humid_flue_gas
  - co2_capture
model:
  cutoff: 5.0
  emb_dim: 48
  dropout: 0.05
  encoder: nequip
  encoder_config:
    avg_num_neighbours: 50.0
    cutoff: 4.0
    emb_dim: 32
    lmax: 1
    n_layers: 2
    n_species: 100
    use_pbc: true
  ensemble:
    n_models: 4
    n_samples: 30
    share_encoder: true
  n_ensemble: 4
  n_layers: 2
  n_rbf: 32
  avg_num_neighbours: 15.0
  tpno_config:
    activation: swish
    convex_constraint: softplus
    dropout: 0.15
    film_conditioning: true
    hidden_dim: 128
    n_components: 3
    n_conditions: 4
    n_layers: 3
    use_layer_norm: true
  lmax: 2
  use_charges: true
results:
  figures:
    benchmark_comparison: true
    calibration: true
    isotherms: true
    pareto: true
    parity: true
    residuals: true
    training_curves: true
  figures_dir: results/figures
  log_level: INFO
  log_to_file: true
  log_to_wandb: false
  logs_dir: experiments/run_001/logs
  metrics:
    pareto:
    - hypervolume
    - pareto_fraction
    - spacing
    regression:
    - mae
    - rmse
    - r2
    - mape
    uncertainty:
    - ece
    - coverage_90
    - sharpness
    - nll
    - crps
  metrics_dir: experiments/run_001/metrics
  run_dir: experiments/run_001
  wandb_entity: your_username
  wandb_project: uc-tpno
simulation:
  conditions:
    dry_co2_fraction: 0.15
    pressures:
    - 0.1
    - 0.5
    - 1.0
    - 5.0
    - 10.0
    relative_humidity:
    - 0.0
    - 0.05
    - 0.15
    temperatures:
    - 298.15
    - 313.15
    - 333.15
  forcefield: GenericMOFs
  gcmc:
    cutoff: 12.0
    keep_workspaces: false
    n_cycles: 5000
    n_init: 2500
    timeout: 7200
    use_charges: false
  gctmmc:
    N_max: 200
    bias_update: 10000
    n_cycles: 50000
    n_init: 10000
  raspa_data_dir: /path/to/raspa/share/raspa
  raspa_path: /path/to/raspa/bin/simulate
training:
  batch_size: 1
  checkpoint_dir: experiments/run_001/checkpoints
  checkpoint_freq: 10
  early_stopping: true
  grad_clip: 1.0
  gradient_accumulation_steps: 1
  lr: 0.0003
  n_epochs: 600
  optimizer: adamw
  patience: 200
  physics_loss:
    adaptive_weights: false
    lambda_competition: 0.0
    lambda_gibbs_duhem: 0.0
    lambda_henry: 0.02
    lambda_hessian: 0.0
    lambda_monotonic: 0.1
    validate_physics: true
    validation_freq: 50
    weight_smoothing: 0.9
    weight_update_freq: 10
  scheduler: cosine_warm_restarts
  scheduler_T0: 30
  scheduler_T_mult: 2
  use_amp: true
  use_nll: false
  warmup_epochs: 30
  weight_decay: 0.0001
uq:
  alpha: 0.1
  cal_size: 0.2
  calibration_freq: 20
  conformal_method: mondrian
  density_ratio: gbm
  evaluate_calibration: true
  n_bins: 5
  score_method: normalized
  weight_clip:
  - 0.1
  - 10.0
validation:
  data_quality:
    check_distribution_shift: true
    check_missing: true
    check_outliers: true
    check_variance: true
  residual_analysis:
    check_autocorrelation: true
    check_heteroscedasticity: true
    check_normality: true
    check_out_of_distribution: true
  thermodynamic:
    check_convexity: true
    check_gibbs_duhem: false
    check_henry_region: true
    check_monotonicity: true
    check_selectivity_trends: true
    check_tolerance: 1e-4
